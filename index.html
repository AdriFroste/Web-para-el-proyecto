<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink Tower</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        
        <section class="download-section">
            <div class="buttons-row">
                <a href="#" class="btn-os">⬇️ Windows</a>
                <a href="#" class="btn-os">🐧 Linux</a>
            </div>
            <p class="download-info">Gratis · Windows y Linux</p>
        </section>

        <section class="contact-section">
            <h2 class="contact-title">✉️ <span class="yellow-text">Escríbenos</span> <span class="orange-text">aquí</span></h2>
            <p class="contact-subtitle">¿Bugs, sugerencias o simplemente quieres saludar? ¡Adelante!</p>
            
            <div class="form-container">
                <form id="miFormulario" action="https://formspree.io/f/xpqonjya" method="POST">
                    
                    <div class="input-group">
                        <label for="nombre">TU NOMBRE</label>
                        <input type="text" id="nombre" name="nombre" placeholder="¿Cómo te llamas?" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="email">TU CORREO</label>
                        <input type="email" id="email" name="email" placeholder="para poder responderte" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="mensaje">MENSAJE</label>
                        <textarea id="mensaje" name="mensaje" rows="5" placeholder="Cuéntanos lo que quieras..." required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-submit">🚀 Enviar mensaje</button>
                </form>
            </div>
        </section>

    </div>

    <script>
        const form = document.getElementById("miFormulario");
        
        form.addEventListener("submit", async function(event) {
            event.preventDefault(); 
            const data = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });
                
                if (response.ok) {
                    document.querySelector('.form-container').innerHTML = "<div class='success-msg'>🚀 ¡Mensaje enviado con éxito! Gracias por escribirnos.</div>";
                } else {
                    alert("Error en el sistema. Inténtalo de nuevo.");
                }
            } catch (error) {
                alert("Error de conexión.");
            }
        });
    </script>
</body>
</html>
